<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walking Tour — San José de Gracia</title>
  <meta name="description" content="An interactive self-guided walking tour of San José de Gracia, Jalisco. 9 stops through the historic centro — cafes, culture, food, and cantinas." />
  <link rel="canonical" href="https://www.sanjosedegracia.net/tour" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.sanjosedegracia.net/tour" />
  <meta property="og:title" content="Walking Tour — San José de Gracia" />
  <meta property="og:description" content="Self-guided walking tour through the historic centro. 9 stops — cafes, culture, food, and cantinas." />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--dark); color: #fff; padding: .5rem 1rem; z-index: 9999; transition: top .2s; }
    .skip-link:focus { top: 0; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --clay:  #C4785A;
      --earth: #8B5E3C;
      --cream: #F5EFE6;
      --dark:  #1C1309;
      --gold:  #D4A843;
      --mist:  #EDE8DF;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); line-height: 1.6; }
    *:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem; background: var(--dark);
    }
    .nav-logo { display: flex; align-items: center; gap: .6rem; text-decoration: none; color: var(--cream); font-family: 'Playfair Display', serif; font-size: 1.1rem; }
    .nav-logo img { height: 2rem; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; color: rgba(245,239,230,.6); transition: color .3s; }
    .nav-links a:hover { color: var(--clay); }
    .nav-links .nav-active { color: var(--clay); }
    .lang-toggle { display: flex; align-items: center; gap: .4rem; background: none; border: 1px solid rgba(245,239,230,.2); border-radius: 20px; padding: .3rem .7rem; cursor: pointer; }
    .lang-opt { font-size: .7rem; letter-spacing: .1em; color: rgba(245,239,230,.35); background: none; border: none; cursor: pointer; }
    .lang-opt.active { color: var(--cream); font-weight: 600; }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: .3rem; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--cream); transition: .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--dark); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .mobile-menu.open { opacity: 1; pointer-events: all; }
    .mobile-menu a { color: var(--cream); text-decoration: none; font-size: 1.2rem; letter-spacing: .15em; text-transform: uppercase; }

    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* LAYOUT */
    .tour-wrap { display: flex; height: calc(100vh - 60px); margin-top: 60px; }
    #map { flex: 1; min-height: 400px; z-index: 1; }
    .tour-sidebar {
      width: 360px; overflow-y: auto; padding: 1.5rem;
      background: var(--cream); border-left: 1px solid var(--mist);
    }
    .tour-sidebar h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: .3rem; }
    .tour-sidebar h1 em { font-style: italic; color: var(--clay); }
    .tour-sidebar .tour-sub { font-size: .85rem; color: rgba(28,19,9,.5); margin-bottom: 1.5rem; }

    .stop-card {
      display: flex; gap: .8rem; padding: .8rem;
      border-radius: 10px; margin-bottom: .5rem;
      cursor: pointer; transition: background .2s;
      border: 1px solid transparent;
    }
    .stop-card:hover, .stop-card.active { background: #fff; border-color: var(--mist); }
    .stop-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--clay); color: #fff; font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      margin-top: 2px;
    }
    .stop-card.start .stop-num { background: #2d8a4e; }
    .stop-card.end .stop-num { background: var(--dark); }
    .stop-info h3 { font-size: .9rem; margin-bottom: .15rem; }
    .stop-info p { font-size: .78rem; color: rgba(28,19,9,.5); }
    .stop-badge { display: inline-block; font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; padding: .15rem .4rem; border-radius: 4px; font-weight: 600; margin-left: .4rem; }
    .badge-start { background: #d4edda; color: #155724; }
    .badge-end { background: #f8d7da; color: #721c24; }

    .tour-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--mist); text-align: center; }
    .tour-footer img { height: 1.4rem; opacity: .3; }
    .tour-footer p { font-size: .7rem; color: rgba(28,19,9,.3); margin-top: .3rem; }

    /* POPUP */
    .leaflet-popup-content-wrapper { border-radius: 10px; font-family: 'DM Sans', sans-serif; }
    .leaflet-popup-content { margin: 12px 16px; }
    .popup-name { font-weight: 600; font-size: .9rem; margin-bottom: 2px; }
    .popup-desc { font-size: .8rem; color: rgba(28,19,9,.6); }

    @media (max-width: 768px) {
      .tour-wrap { flex-direction: column; }
      .tour-sidebar { width: 100%; max-height: 45vh; border-left: none; border-top: 1px solid var(--mist); }
      #map { min-height: 55vh; }
    }

    /* FOOTER */
    footer { background: var(--dark); color: rgba(255,255,255,.6); text-align: center; padding: 2rem 1.5rem; }
    .footer-logo { color: var(--clay); font-family: 'Playfair Display', serif; font-size: 1.2rem; text-decoration: none; }
    .footer-links { margin: .8rem 0; display: flex; justify-content: center; gap: 2rem; }
    .footer-links a { color: rgba(255,255,255,.5); text-decoration: none; font-size: .85rem; letter-spacing: .15em; text-transform: uppercase; }
    .footer-a11y { font-size: .75rem; max-width: 600px; margin: .8rem auto; color: rgba(255,255,255,.35); }
    .footer-a11y a { color: rgba(255,255,255,.5); }
    .footer-copy { font-size: .75rem; color: rgba(255,255,255,.3); margin-top: .8rem; }
    .footer-jmm-logo { height: 1.2rem; vertical-align: middle; opacity: .4; margin: 0 .3rem; }

    /* DOWNLOAD BTN */
    .tour-dl { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.5rem; }
    .btn-dl {
      display: inline-flex; align-items: center; gap: .4rem;
      background: var(--dark); color: var(--cream); border: none;
      padding: .6rem 1.2rem; border-radius: 8px; font-size: .8rem;
      font-family: inherit; cursor: pointer; text-decoration: none;
      letter-spacing: .05em; transition: background .2s;
    }
    .btn-dl:hover { background: var(--earth); }
    .btn-dl svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* PRINT WATERMARK (hidden on screen, shown in print) */
    .print-watermark { display: none; }
    .print-map { display: none; }

    /* PRINT STYLES */
    @media print {
      nav, .mobile-menu, .hamburger, .lang-toggle, .skip-link, .btn-dl, .tour-dl { display: none !important; }
      body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .tour-wrap { display: flex !important; height: auto !important; margin-top: 0 !important; page-break-inside: avoid; }
      #map { flex: 1 !important; min-height: 700px !important; }
      .tour-sidebar { width: 340px !important; border-left: 1px solid #ddd !important; max-height: none !important; overflow: visible !important; padding: 1rem !important; }
      .tour-sidebar h1 { font-size: 1.4rem; }
      .tour-sidebar .tour-sub { font-size: .75rem; margin-bottom: 1rem; }
      .stop-card { break-inside: avoid; border: 1px solid #eee !important; background: #fff !important; padding: .5rem !important; margin-bottom: .3rem !important; }
      .stop-num { width: 22px !important; height: 22px !important; font-size: .65rem !important; }
      .stop-info h3 { font-size: .8rem !important; }
      .stop-info p { font-size: .7rem !important; }
      .stop-badge { font-size: .5rem !important; }
      .tour-footer { margin-top: 1rem; }
      .tour-footer img { height: 1rem; }
      .tour-footer p { font-size: .6rem; }
      .print-watermark {
        display: block !important;
        position: fixed; top: 50%; left: 35%;
        transform: translate(-50%, -50%) rotate(-30deg);
        opacity: .07;
        z-index: 9999;
        pointer-events: none;
      }
      .print-watermark img { width: 300px; }
      @page { size: landscape; margin: 0.5cm; }
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#main-content" data-i18n="skip-link">Skip to main content</a>

  <nav aria-label="Main navigation">
    <a href="/" class="nav-logo">
      <img src="/temple.png" alt="" aria-hidden="true" />
      San José de Gracia
    </a>
    <ul class="nav-links">
      <li><a href="/businesses" data-i18n="nav-directory">Directory</a></li>
      <li><a href="/#stay" data-i18n="nav-stay">Stay</a></li>
      <li><a href="/#events" data-i18n="nav-events">Events</a></li>
      <li><a href="/#getting-here" data-i18n="nav-getting-here">Getting Here</a></li>
      <li><a href="/#contact" data-i18n="nav-contact">Contact</a></li>
      <li><a href="/faq" data-i18n="nav-faq">FAQ</a></li>
    </ul>
    <button class="lang-toggle" id="lang-toggle" aria-label="Toggle language">
      <span class="lang-opt active" data-lang="en">EN</span>
      <span class="lang-sep" style="color:rgba(245,239,230,.3);">·</span>
      <span class="lang-opt" data-lang="es">ES</span>
    </button>
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu" role="dialog" aria-label="Mobile navigation">
    <a href="/businesses" onclick="closeMobileMenu()" data-i18n="nav-directory">Directory</a>
    <a href="/#stay" onclick="closeMobileMenu()" data-i18n="nav-stay">Stay</a>
    <a href="/#events" onclick="closeMobileMenu()" data-i18n="nav-events">Events</a>
    <a href="/#getting-here" onclick="closeMobileMenu()" data-i18n="nav-getting-here">Getting Here</a>
    <a href="/#contact" onclick="closeMobileMenu()" data-i18n="nav-contact">Contact</a>
    <a href="/faq" onclick="closeMobileMenu()" data-i18n="nav-faq">FAQ</a>
    <div class="mobile-lang">
      <button class="lang-opt active" data-lang="en" id="ml-en">EN</button>
      <button class="lang-opt" data-lang="es" id="ml-es">ES</button>
    </div>
  </div>

  <!-- PRINT WATERMARK -->
  <div class="print-watermark" aria-hidden="true">
    <img src="/jmm-logo.png" alt="" />
  </div>

  <!-- MAIN -->
  <div class="tour-wrap" id="main-content">
    <div id="map"></div>
    <div class="tour-sidebar">
      <h1 data-i18n="tour-h1">Walking <em>Tour</em></h1>
      <p class="tour-sub" data-i18n="tour-sub">A self-guided walk through the centro. ~1.5 km · 9 stops · 1–2 hours</p>
      <div class="tour-dl">
        <button class="btn-dl" onclick="window.print()" data-i18n="tour-print">
          <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / Save PDF
        </button>
      </div>
      <div id="stop-list"></div>
      <div class="tour-footer">
        <a href="https://jaimem.com" target="_blank" rel="noopener"><img src="/jmm-logo.png" alt="JMM" class="footer-jmm-logo" /></a>
        <p data-i18n="tour-credit">sanjosedegracia.net</p>
      </div>
    </div>
  </div>

<script>
  // ── STOPS DATA ──
  const STOPS = [
    { num: 1, lat: 20.6755, lng: -102.5722, icon: '🏠',
      en: { name: 'Your Airbnb', desc: 'Moctezuma 153 — Start here', addr: 'Moctezuma 153' },
      es: { name: 'Tu Airbnb', desc: 'Moctezuma 153 — Comienza aquí', addr: 'Moctezuma 153' },
      badge: 'start' },
    { num: 2, lat: 20.6754, lng: -102.5724, icon: '☕',
      en: { name: 'Café Azul Cobalto', desc: 'Coffee and pastries — right next door', addr: 'Moctezuma 155' },
      es: { name: 'Café Azul Cobalto', desc: 'Café y postres — justo al lado', addr: 'Moctezuma 155' } },
    { num: 3, lat: 20.6750, lng: -102.5710, icon: '⛪',
      en: { name: 'Plaza Principal', desc: 'French-imported kiosk, Parroquia del Señor San José, and the Cabeza de Águila monument', addr: 'Centro' },
      es: { name: 'Plaza Principal', desc: 'Kiosco importado de Francia, Parroquia del Señor San José y el monumento Cabeza de Águila', addr: 'Centro' } },
    { num: 4, lat: 20.6750, lng: -102.5700, icon: '🍦',
      en: { name: 'Paletería y Nevería San José', desc: 'Local-flavor ice cream and paletas — across from the church', addr: 'Frente a la Parroquia' },
      es: { name: 'Paletería y Nevería San José', desc: 'Helados y paletas de sabores locales — frente a la iglesia', addr: 'Frente a la Parroquia' } },
    { num: 5, lat: 20.6779, lng: -102.5714, icon: '🎨',
      en: { name: 'Centro Cultural', desc: 'Gallery, classrooms, and auditorium — reopened in 2021', addr: 'Josefa Ortiz de Domínguez 189-B' },
      es: { name: 'Centro Cultural', desc: 'Galería, salones y auditorio — reabierto en 2021', addr: 'Josefa Ortiz de Domínguez 189-B' } },
    { num: 6, lat: 20.6750, lng: -102.5690, icon: '🛍️',
      en: { name: 'Calle Hidalgo', desc: 'The main commercial street — shops, foot traffic, and local life', addr: 'Calle Hidalgo' },
      es: { name: 'Calle Hidalgo', desc: 'La calle comercial principal — tiendas, peatones y vida local', addr: 'Calle Hidalgo' } },
    { num: 7, lat: 20.6751, lng: -102.5684, icon: '🍽️',
      en: { name: 'Bramido San José', desc: 'Popular restaurant — Mexican and seafood. Great for a sit-down meal.', addr: 'Hidalgo 110' },
      es: { name: 'Bramido San José', desc: 'Restaurante popular — comida mexicana y mariscos. Ideal para una comida.', addr: 'Hidalgo 110' } },
    { num: 8, lat: 20.6749, lng: -102.5706, icon: '🏛️',
      en: { name: 'Los Portales', desc: 'Historic arcaded walkways surrounding the plaza — perfect for people-watching', addr: 'Plaza Principal' },
      es: { name: 'Los Portales', desc: 'Portales históricos alrededor de la plaza — perfecto para ver pasar la gente', addr: 'Plaza Principal' } },
    { num: 9, lat: 20.6758, lng: -102.5721, icon: '🍸',
      en: { name: 'Cantina La Soga', desc: 'End the tour here — cold drinks, seafood, and good vibes. Salud!', addr: 'Independencia 90' },
      es: { name: 'Cantina La Soga', desc: 'Termina el tour aquí — bebidas frías, mariscos y buen ambiente. ¡Salud!', addr: 'Independencia 90' },
      badge: 'end' }
  ];

  // ── TRANSLATIONS ──
  const T = {
    en: {
      'skip-link':       'Skip to main content',
      'nav-directory':   'Directory',
      'nav-stay':        'Stay',
      'nav-events':      'Events',
      'nav-getting-here':'Getting Here',
      'nav-contact':     'Contact',
      'nav-faq':         'FAQ',
      'nav-advertise':   'Advertise',
      'tour-h1':         'Walking <em>Tour</em>',
      'tour-sub':        'A self-guided walk through the centro. ~1.5 km · 9 stops · 1–2 hours',
      'tour-credit':     'sanjosedegracia.net',
      'tour-print':      '<svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Print / Save PDF',
      'footer-contact':  'Contact',
      'footer-a11y':     'We are committed to making this website accessible to all visitors. If you experience any difficulty, please <a href="https://jaimem.com" target="_blank" rel="noopener">contact us</a>.',
      'badge-start':     'START',
      'badge-end':       'END',
    },
    es: {
      'skip-link':       'Ir al contenido principal',
      'nav-directory':   'Directorio',
      'nav-stay':        'Alojarse',
      'nav-events':      'Eventos',
      'nav-getting-here':'Cómo Llegar',
      'nav-contact':     'Contacto',
      'nav-faq':         'Info',
      'nav-advertise':   'Anúnciate',
      'tour-h1':         'Recorrido a <em>Pie</em>',
      'tour-sub':        'Un recorrido autoguiado por el centro. ~1.5 km · 9 paradas · 1–2 horas',
      'tour-credit':     'sanjosedegracia.net',
      'tour-print':      '<svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir / Guardar PDF',
      'footer-contact':  'Contacto',
      'footer-a11y':     'Nos comprometemos a hacer este sitio accesible para todos los visitantes. Si tienes alguna dificultad, por favor <a href="https://jaimem.com" target="_blank" rel="noopener">contáctanos</a>.',
      'badge-start':     'INICIO',
      'badge-end':       'FIN',
    }
  };

  let lang = 'en';

  // ── MAP SETUP ──
  const map = L.map('map', { zoomControl: true }).setView([20.6748, -102.5705], 17);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(map);

  // ── CHURCH ICON on plaza green ──
  L.marker([20.6748, -102.5708], {
    icon: L.divIcon({
      className: '',
      html: '<div style="font-size:22px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));">⛪</div>',
      iconSize: [24, 24],
      iconAnchor: [12, 12]
    }),
    interactive: false
  }).addTo(map);

  // ── CUSTOM MARKER ──
  function makeIcon(num, badge) {
    let bg = '#C4785A';
    if (badge === 'start') bg = '#2d8a4e';
    if (badge === 'end') bg = '#1C1309';
    return L.divIcon({
      className: '',
      html: `<div style="background:${bg};color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff;">${num}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15],
      popupAnchor: [0, -18]
    });
  }

  // ── RENDER ──
  const markers = [];
  const routeCoords = STOPS.map(s => [s.lat, s.lng]);

  // Draw route line
  L.polyline(routeCoords, { color: '#C4785A', weight: 3, opacity: .6, dashArray: '8, 8' }).addTo(map);

  // Add markers
  STOPS.forEach((s, i) => {
    const d = s[lang];
    const marker = L.marker([s.lat, s.lng], { icon: makeIcon(s.num, s.badge) })
      .addTo(map)
      .bindPopup(`<div class="popup-name">${s.icon} ${d.name}</div><div class="popup-desc">${d.desc}</div>`);
    markers.push(marker);
  });

  // Build sidebar
  function renderSidebar() {
    const list = document.getElementById('stop-list');
    list.innerHTML = '';
    STOPS.forEach((s, i) => {
      const d = s[lang];
      let badgeHTML = '';
      if (s.badge === 'start') badgeHTML = `<span class="stop-badge badge-start">${T[lang]['badge-start']}</span>`;
      if (s.badge === 'end') badgeHTML = `<span class="stop-badge badge-end">${T[lang]['badge-end']}</span>`;
      const card = document.createElement('div');
      card.className = `stop-card${s.badge ? ' ' + s.badge : ''}`;
      card.innerHTML = `
        <div class="stop-num">${s.num}</div>
        <div class="stop-info">
          <h3>${d.name}${badgeHTML}</h3>
          <p>${d.desc}</p>
        </div>`;
      card.addEventListener('click', () => {
        map.flyTo([s.lat, s.lng], 18, { duration: .5 });
        markers[i].openPopup();
        document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
      list.appendChild(card);
    });
  }
  renderSidebar();

  // ── LANG ──
  function applyLang(l, save = true) {
    lang = l;
    if (save) localStorage.setItem('lang', l);
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (T[l][key]) el.innerHTML = T[l][key];
    });
    document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === l));
    // Update markers and sidebar
    markers.forEach((m, i) => {
      const s = STOPS[i];
      const d = s[l];
      m.setPopupContent(`<div class="popup-name">${s.icon} ${d.name}</div><div class="popup-desc">${d.desc}</div>`);
    });
    renderSidebar();
  }
  document.querySelectorAll('.lang-opt').forEach(b => b.addEventListener('click', () => applyLang(b.getAttribute('data-lang'))));

  // ── MOBILE MENU ──
  const hamburger = document.getElementById('hamburger');
  function closeMobileMenu() {
    hamburger.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false');
    document.getElementById('mobileMenu').classList.remove('open');
  }
  hamburger.addEventListener('click', () => {
    const isOpen = !hamburger.classList.contains('open');
    hamburger.classList.toggle('open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen);
    document.getElementById('mobileMenu').classList.toggle('open', isOpen);
  });

  // ── LANG INIT ──
  const stored = localStorage.getItem('lang');
  if (stored === 'en' || stored === 'es') {
    applyLang(stored, false);
  } else {
    fetch('https://ipapi.co/json/')
      .then(r => r.json())
      .then(d => applyLang(d.country_code === 'MX' ? 'es' : 'en', false))
      .catch(() => {
        const bl = (navigator.language || '').toLowerCase();
        applyLang(bl.startsWith('es') ? 'es' : 'en', false);
      });
  }
</script>
</body>
</html>
