name: Events Worker

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: sjdg-events-worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install worker dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-worker.txt
          python -m playwright install --with-deps chromium

      - name: Run events worker
        env:
          SJDG_SITE_BASE_URL: ${{ secrets.SJDG_SITE_BASE_URL }}
          SJDG_ADMIN_TOKEN: ${{ secrets.SJDG_ADMIN_TOKEN }}
          FACEBOOK_STORAGE_STATE_BASE64: ${{ secrets.FACEBOOK_STORAGE_STATE_BASE64 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WORKER_SUMMARY_PATH: .worker-artifacts/summary.json
          WORKER_ARTIFACT_DIR: .worker-artifacts
          WORKER_MAX_POSTS_PER_SOURCE: "3"
        run: |
          mkdir -p .worker-artifacts
          python scripts/events_feed_worker.py

      - name: Upload worker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: events-worker-artifacts
          path: .worker-artifacts
          if-no-files-found: ignore
