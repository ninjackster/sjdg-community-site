  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <div class="tour-wrap" id="main-content">
    <div id="map"></div>
    <div class="tour-sidebar">
      <h1>{{sidebar.h1}}</h1>
      <p class="tour-sub">{{sidebar.sub}}</p>
      <div class="tour-dl">
        <button class="btn-dl" onclick="window.print()">{{sidebar.print}}</button>
      </div>
      <div id="stop-list"></div>
      <div class="tour-footer">
        <a href="https://jaimem.com" target="_blank" rel="noopener"><img src="/jmm-logo.png" alt="JMM" class="footer-jmm-logo" /></a>
        <p>{{sidebar.credit}}</p>
      </div>
    </div>
  </div>

<style>
  .tour-wrap { display: flex; height: calc(100vh - 60px); margin-top: 60px; }
  #map { flex: 1; min-height: 400px; z-index: 1; }
  .tour-sidebar { width: 360px; overflow-y: auto; padding: 1.5rem; background: var(--cream); border-left: 1px solid var(--mist); }
  .tour-sidebar h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: .3rem; }
  .tour-sidebar h1 em { font-style: italic; color: var(--clay); }
  .tour-sidebar .tour-sub { font-size: .85rem; color: rgba(28,19,9,.5); margin-bottom: 1.5rem; }
  .tour-dl { margin-bottom: 1.2rem; }
  .btn-dl { display: inline-flex; align-items: center; gap: .4rem; background: var(--dark); color: var(--cream); border: none; padding: .55rem .9rem; font-size: .75rem; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; border-radius: 4px; }
  .btn-dl svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
  .stop-card { display: flex; gap: .8rem; padding: .8rem; border-radius: 10px; margin-bottom: .5rem; cursor: pointer; transition: background .2s; }
  .stop-card:hover, .stop-card.active { background: var(--mist); }
  .stop-num { width: 30px; height: 30px; flex-shrink: 0; background: var(--clay); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; }
  .stop-card.start .stop-num { background: #2d8a4e; }
  .stop-card.end .stop-num { background: var(--dark); }
  .stop-info h3 { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: .15rem; display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
  .stop-info p { font-size: .8rem; color: rgba(28,19,9,.65); line-height: 1.45; }
  .stop-badge { font-size: .6rem; letter-spacing: .15em; padding: .15rem .45rem; border-radius: 3px; font-weight: 600; }
  .badge-start { background: #2d8a4e; color: #fff; }
  .badge-end { background: var(--dark); color: var(--cream); }
  .tour-footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--mist); display: flex; align-items: center; gap: .6rem; font-size: .7rem; color: rgba(28,19,9,.4); }
  .tour-footer img.footer-jmm-logo { height: 22px; width: auto; }
  .leaflet-popup-content .popup-name { font-weight: 700; font-size: .9rem; margin-bottom: .2rem; }
  .leaflet-popup-content .popup-desc { font-size: .8rem; color: rgba(28,19,9,.7); }
  @media (max-width: 768px) {
    .tour-wrap { flex-direction: column; }
    .tour-sidebar { width: 100%; max-height: 45vh; border-left: none; border-top: 1px solid var(--mist); }
  }
  @media print {
    nav, .lang-toggle, .hamburger, .mobile-menu, .rental-tab, .rental-popup, footer, .btn-dl { display: none !important; }
    .tour-wrap { display: flex !important; height: auto !important; margin-top: 0 !important; page-break-inside: avoid; }
    #map { display: none; }
    .tour-sidebar { width: 100% !important; border-left: none !important; max-height: none !important; overflow: visible !important; padding: 1rem !important; }
    .tour-sidebar h1 { font-size: 1.4rem; }
    .tour-sidebar .tour-sub { font-size: .75rem; margin-bottom: 1rem; }
    .stop-card { break-inside: avoid; padding: .5rem; margin-bottom: .3rem; border: 1px solid var(--mist); }
  }
</style>

<script>
  // STOPS data — pre-localized at build time. Each stop has its name/desc/addr in the page's language already.
  const STOPS = [
    { num: 1, lat: 20.6755, lng: -102.5722, icon: '🏠', name: '{{stops.0.name}}', desc: '{{stops.0.desc}}', addr: '{{stops.0.addr}}', badge: 'start' },
    { num: 2, lat: 20.6754, lng: -102.5724, icon: '☕', name: '{{stops.1.name}}', desc: '{{stops.1.desc}}', addr: '{{stops.1.addr}}' },
    { num: 3, lat: 20.6750, lng: -102.5710, icon: '⛪', name: '{{stops.2.name}}', desc: '{{stops.2.desc}}', addr: '{{stops.2.addr}}' },
    { num: 4, lat: 20.6750, lng: -102.5700, icon: '🍦', name: '{{stops.3.name}}', desc: '{{stops.3.desc}}', addr: '{{stops.3.addr}}' },
    { num: 5, lat: 20.6779, lng: -102.5714, icon: '🎨', name: '{{stops.4.name}}', desc: '{{stops.4.desc}}', addr: '{{stops.4.addr}}' },
    { num: 6, lat: 20.6750, lng: -102.5690, icon: '🛍️', name: '{{stops.5.name}}', desc: '{{stops.5.desc}}', addr: '{{stops.5.addr}}' },
    { num: 7, lat: 20.6751, lng: -102.5684, icon: '🍽️', name: '{{stops.6.name}}', desc: '{{stops.6.desc}}', addr: '{{stops.6.addr}}' },
    { num: 8, lat: 20.6749, lng: -102.5706, icon: '🏛️', name: '{{stops.7.name}}', desc: '{{stops.7.desc}}', addr: '{{stops.7.addr}}' },
    { num: 9, lat: 20.6758, lng: -102.5721, icon: '🍸', name: '{{stops.8.name}}', desc: '{{stops.8.desc}}', addr: '{{stops.8.addr}}', badge: 'end' }
  ];

  const BADGE_LABELS = { start: '{{badges.start}}', end: '{{badges.end}}' };

  const tourMap = L.map('map', { zoomControl: true }).setView([20.6748, -102.5705], 17);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(tourMap);

  L.marker([20.6748, -102.5708], {
    icon: L.divIcon({ className: '', html: '<div style="font-size:22px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));">⛪</div>', iconSize: [24, 24], iconAnchor: [12, 12] }),
    interactive: false
  }).addTo(tourMap);

  function makeIcon(num, badge) {
    let bg = '#C4785A';
    if (badge === 'start') bg = '#2d8a4e';
    if (badge === 'end') bg = '#1C1309';
    return L.divIcon({
      className: '',
      html: `<div style="background:${bg};color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff;">${num}</div>`,
      iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -18]
    });
  }

  const tourMarkers = [];
  L.polyline(STOPS.map(s => [s.lat, s.lng]), { color: '#C4785A', weight: 3, opacity: .6, dashArray: '8, 8' }).addTo(tourMap);
  STOPS.forEach((s) => {
    const marker = L.marker([s.lat, s.lng], { icon: makeIcon(s.num, s.badge) })
      .addTo(tourMap)
      .bindPopup(`<div class="popup-name">${s.icon} ${s.name}</div><div class="popup-desc">${s.desc}</div>`);
    tourMarkers.push(marker);
  });

  (function renderTourSidebar() {
    const list = document.getElementById('stop-list');
    list.innerHTML = '';
    STOPS.forEach((s, i) => {
      let badgeHTML = '';
      if (s.badge === 'start') badgeHTML = `<span class="stop-badge badge-start">${BADGE_LABELS.start}</span>`;
      if (s.badge === 'end') badgeHTML = `<span class="stop-badge badge-end">${BADGE_LABELS.end}</span>`;
      const card = document.createElement('div');
      card.className = `stop-card${s.badge ? ' ' + s.badge : ''}`;
      card.innerHTML = `<div class="stop-num">${s.num}</div><div class="stop-info"><h3>${s.name}${badgeHTML}</h3><p>${s.desc}</p></div>`;
      card.addEventListener('click', () => {
        tourMap.flyTo([s.lat, s.lng], 18, { duration: .5 });
        tourMarkers[i].openPopup();
        document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
      list.appendChild(card);
    });
  })();
</script>
